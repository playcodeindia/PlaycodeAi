<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Playcode AI + Gemini</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        :root {
            --bg-color: #131314;
            --surface-color: #1e1f20;
            --surface-hover: #333537;
            --text-primary: #e3e3e3;
            --text-secondary: #c4c7c5;
            --accent-blue: #669df6;
            --border-color: #444746;
            --font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        .header {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-color);
            z-index: 10;
        }

        .header-brand {
            font-size: 20px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* --- Chat Area --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
            padding-bottom: 180px; /* Space for large input area */
        }

        .message-row {
            display: flex;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            gap: 16px;
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .bot-avatar {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bot-avatar svg {
            width: 24px;
            height: 24px;
            fill: var(--accent-blue);
        }

        .message-bubble {
            max-width: 85%;
            font-size: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            color: var(--text-primary);
        }

        .message-row.user .message-bubble {
            background-color: var(--surface-color);
            padding: 12px 20px;
            border-radius: 24px;
            border-bottom-right-radius: 4px;
        }

        /* --- Markdown Styling --- */
        .message-bubble pre {
            background-color: #1e1e1e;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid var(--border-color);
        }
        
        .message-bubble code {
            font-family: 'Consolas', monospace;
            font-size: 14px;
        }

        .message-bubble p { margin-bottom: 12px; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble ul, .message-bubble ol { margin-left: 24px; margin-bottom: 12px; }
        .error-msg { color: #f28b82; font-weight: 500; }

        /* --- Custom Rotating Sparkle Loader --- */
        .custom-loader-container {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-blue);
            font-weight: 500;
        }

        .rotating-sparkle {
            position: relative;
            width: 24px;
            height: 24px;
            animation: spin 2s linear infinite;
        }

        .rotating-sparkle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            background-color: var(--accent-blue);
            transform: translate(-50%, -50%) rotate(45deg);
            clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
        }

        .rotating-sparkle::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            border-top: 3px solid var(--accent-blue);
            border-left: 3px solid var(--accent-blue);
            border-radius: 100% 0 0 0;
            transform: translate(-2px, -2px);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Gemini Input Area Layout --- */
        .input-container-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(19,19,20,0) 0%, var(--bg-color) 20%);
            padding: 24px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }

        .input-box-gemini {
            background-color: var(--surface-color);
            border-radius: 32px;
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .input-box-gemini:focus-within {
            background-color: #282a2c;
        }

        .input-box-gemini textarea {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            padding: 8px 8px 16px 8px;
            resize: none;
            max-height: 200px;
            min-height: 24px;
            outline: none;
        }

        .input-box-gemini textarea::placeholder {
            color: var(--text-secondary);
        }

        .input-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toolbar-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .toolbar-btn i { font-size: 18px; }
        .toolbar-btn:hover { background-color: rgba(255,255,255,0.05); color: var(--text-primary); }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            pointer-events: none;
        }

        .send-btn i { font-size: 20px; }
        .send-btn.active { color: var(--text-primary); pointer-events: all; }
        .send-btn.active:hover { background-color: rgba(255,255,255,0.1); }

        .footer-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 16px;
            text-align: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444746; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #5f6368; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-brand">Playcode AI + Gemini</div>
    </div>

    <div class="chat-container" id="chatContainer">
        </div>

    <div class="input-container-wrapper">
        <div class="input-box-gemini">
            <textarea id="userInput" rows="1" placeholder="Ask Playcode AI..." oninput="autoResize(this)"></textarea>
            
            <div class="input-toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" onclick="clearChat()" title="Clear Chat"><i class="fas fa-plus"></i></button>
                    <button class="toolbar-btn"><i class="fas fa-sliders-h"></i> Tools</button>
                </div>
                <div class="toolbar-right">
                    <button class="toolbar-btn">Pro <i class="fas fa-chevron-down" style="font-size: 12px;"></i></button>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="footer-text">Playcode AI + Gemini can make mistakes. Consider verifying important information.</div>
    </div>

    <script>
        // ==========================================
        // SYSTEM CONFIGURATION & KNOWLEDGE
        // ==========================================
        
        // BASS YAHAN APNI SAMBANOVA API KEY DAAL DO 
        const API_KEY = "b5c6ba89-2ea8-4d77-9406-aa1e5f8c7298"; 
        
        const API_URL = "https://api.sambanova.ai/v1/chat/completions";
        
        const playcodeKnowledge = {
            "what is this website": "This website provides Google Play redeem codes with a 16% discount. Users can request and manage gift codes using the Playcode Management system.",
            "how does the redeem code work": "Open the Google Play Store, tap your profile icon, go to Payments & subscriptions, select Redeem code, enter the code, and confirm. The balance will be added instantly.",
            "is this service free": "No, this service is not free. We offer a 16% discount on Google Play redeem codes.",
            "how many times can i redeem a code": "Each redeem code can be used only one time. After successful redemption, the code becomes invalid.",
            "what is the code validity period": "Each redeem code is valid for one month from the date it is issued.",
            "is login required to use this website": "Your account is automatically detected using your registered email. To create a new account, you must contact an agent via email.",
            "how can i create an account": "To create an account, please contact our agent by sending an email to playcodeagent@gmail.com.",
            "which platforms are supported": "Currently, this service supports Google Play Store only.",
            "is playcode official": "Yes, this is Playcode Official.",
            "what should i do if my code is not working": "If your redeem code is not working, please email playcodeagent@gmail.com with complete details.",
            "how long does redemption take": "Redemption is instant. Once entered correctly, the balance is added immediately to your Google Play account.",
            "can i use the code on multiple devices": "No. Once redeemed, the code is linked to a single Google Play account and cannot be reused on another device.",
            "are refunds available": "No refunds are provided once a redeem code has been issued or used.",
            "is my data safe on this website": "Yes, we prioritize user privacy and handle all data securely.",
            "can i request multiple codes": "Yes, multiple requests can be made, but each code will be issued separately.",
            "do codes work in all countries": "Redeem codes work only in regions supported by Google Play. Regional restrictions may apply.",
            "what payment methods are accepted": "Payment methods depend on current availability and will be shared during the request process.",
            "can i cancel my request": "Once a redeem code is generated, cancellation is not possible.",
            "are there daily limits": "Yes, daily limits may apply depending on system availability.",
            "will there be future updates": "Yes, the website is under continuous development and receives weekly updates to improve features and performance."
        };

        // YEH WALA PROMPT CHANGE KIYA HAI - AB YE KUCH BHI ANSWER KAREGA
        const systemPrompt = {
            "role": "system",
            "content": `You are the official Playcode AI Assistant powered by Gemini Architecture. 
            For Playcode-related questions, STRICTLY use this knowledge: ${JSON.stringify(playcodeKnowledge)}. 
            For ALL OTHER questions (like general knowledge, coding, games, random chat, etc.), use your vast general knowledge to answer naturally and helpfully. Do not restrict yourself to Playcode data if the user asks something else.
            Format responses professionally. Ensure any code uses markdown and math uses standard LaTeX delimiters ( $$ for block, $ for inline ).`
        };

        let chatHistory = [systemPrompt];

        // ==========================================
        // UI & EVENT LISTENERS
        // ==========================================
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        marked.setOptions({
            highlight: function(code, lang) {
                const language = highlight.getLanguage(lang) ? lang : 'plaintext';
                return highlight.highlight(code, { language }).value;
            },
            breaks: true
        });

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
            if (textarea.value.trim().length > 0) {
                sendBtn.classList.add('active');
            } else {
                sendBtn.classList.remove('active');
            }
        }

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (userInput.value.trim().length > 0) {
                    sendMessage();
                }
            }
        });

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function clearChat() {
            chatContainer.innerHTML = '';
            chatHistory = [systemPrompt];
            appendBotMessage("Hello! I am Playcode AI + Gemini. How can I help you today?");
        }

        function renderMarkdownAndMath(element, text) {
            try {
                const rawHtml = marked.parse(text);
                const safeHtml = DOMPurify.sanitize(rawHtml);
                element.innerHTML = safeHtml;
                
                renderMathInElement(element, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "\\[", right: "\\]", display: true},
                        {left: "$", right: "$", display: false},
                        {left: "\\(", right: "\\)", display: false}
                    ],
                    throwOnError: false
                });
            } catch (err) {
                element.innerText = text; 
            }
        }

        function appendUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'message-row user';
            row.innerHTML = `<div class="message-bubble">${DOMPurify.sanitize(text).replace(/\n/g, '<br>')}</div>`;
            chatContainer.appendChild(row);
            scrollToBottom();
        }

        function createBotMessageNode() {
            const row = document.createElement('div');
            row.className = 'message-row bot';
            
            const avatar = document.createElement('div');
            avatar.className = 'bot-avatar';
            avatar.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20.25 10.75L21.5 7.5L24.75 6.25L21.5 5L20.25 1.75L19 5L15.75 6.25L19 7.5L20.25 10.75ZM11.75 11.25L9 5L6.25 11.25L0 14L6.25 16.75L9 23L11.75 16.75L18 14L11.75 11.25ZM20.25 17.25L19 20.5L15.75 21.75L19 23L20.25 26.25L21.5 23L24.75 21.75L21.5 20.5L20.25 17.25Z"/></svg>`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            bubble.innerHTML = `
                <div class="custom-loader-container">
                    <div class="rotating-sparkle"></div>
                </div>
            `;

            row.appendChild(avatar);
            row.appendChild(bubble);
            chatContainer.appendChild(row);
            scrollToBottom();

            return bubble;
        }

        function appendBotMessage(text) {
            const bubble = createBotMessageNode();
            renderMarkdownAndMath(bubble, text);
        }

        // ==========================================
        // API CALL & 3 SEC DELAY LOGIC
        // ==========================================
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            if (API_KEY === "YOUR_SAMBANOVA_API_KEY_HERE" || !API_KEY) {
                appendBotMessage("<span class='error-msg'>Developer Alert: API_KEY update nahi ki gayi hai script me.</span>");
                return;
            }

            userInput.value = '';
            autoResize(userInput);
            userInput.disabled = true;

            appendUserMessage(text);
            chatHistory.push({ "role": "user", "content": text });
            
            const botBubbleNode = createBotMessageNode();

            await new Promise(resolve => setTimeout(resolve, 3000));

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        stream: true,
                        model: "gemma-3-12b-it",
                        messages: chatHistory
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API Error ${response.status}: ${errorText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let fullBotResponse = "";
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 

                    for (const line of lines) {
                        if (line.trim() === '') continue;
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') break;
                            
                            try {
                                const data = JSON.parse(dataStr);
                                const delta = data.choices[0].delta.content;
                                if (delta) {
                                    fullBotResponse += delta;
                                    renderMarkdownAndMath(botBubbleNode, fullBotResponse);
                                    scrollToBottom();
                                }
                            } catch (err) {
                                console.error("Parsing stream chunk error:", err);
                            }
                        }
                    }
                }

                chatHistory.push({ "role": "assistant", "content": fullBotResponse });

            } catch (error) {
                console.error(error);
                botBubbleNode.innerHTML = `<span class='error-msg'>Connection Failed: ${error.message}</span>`;
                chatHistory.pop(); 
            } finally {
                userInput.disabled = false;
                userInput.focus();
            }
        }

        window.onload = () => clearChat();
    </script>
</body>
</html>
